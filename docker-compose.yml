version: "3.9"

services:
  nex-niflo-agent-ollama:
    image: ollama/ollama
    container_name: nex-niflo-agent-ollama
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_NUM_CTX=4096
      - OLLAMA_GPU_LAYERS=35
    volumes:
      - nex-niflo-agent-ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  nex-niflo-agent-openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: nex-niflo-agent-openclaw
    environment:
      - OLLAMA_BASE_URL=http://nex-niflo-agent-ollama:11434
      - OPENCLAW_GATEWAY_TOKEN=nex-niflo-secret
      - OPENCLAW_GATEWAY_MODE=local
    ports:
      - "3001:18789"
    depends_on:
      - nex-niflo-agent-ollama
    restart: unless-stopped

  nex-niflo-agent-api:
    image: python:3.11-slim
    container_name: nex-niflo-agent-api
    working_dir: /app
    volumes:
      - ./nex-api:/app
    command: >
      bash -c "pip install fastapi uvicorn requests redis &&
               uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=nex-niflo-agent-redis
      - OPENCLAW_URL=http://nex-niflo-agent-openclaw:18789/v1/chat/completions
      - OPENCLAW_AUTH_TOKEN=nex-niflo-secret
      - N8N_WEBHOOK_URL=http://nex-niflo-agent-n8n:5678/webhook/skill
    depends_on:
      - nex-niflo-agent-openclaw
      - nex-niflo-agent-redis
      - nex-niflo-agent-n8n
    restart: unless-stopped

  nex-niflo-agent-n8n:
    image: n8nio/n8n:latest
    container_name: nex-niflo-agent-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
    volumes:
      - nex-niflo-agent-n8n:/home/node/.n8n
    restart: unless-stopped

  nex-niflo-agent-qdrant:
    image: qdrant/qdrant:latest
    container_name: nex-niflo-agent-qdrant
    ports:
      - "6333:6333"
    volumes:
      - nex-niflo-agent-qdrant:/qdrant/storage
    restart: unless-stopped

  nex-niflo-agent-redis:
    image: redis:7-alpine
    container_name: nex-niflo-agent-redis
    volumes:
      - nex-niflo-agent-redis:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  nex-niflo-agent-librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: nex-niflo-agent-librechat
    ports:
      - "3210:3080"
    environment:
      - HOST=0.0.0.0
      - PORT=3080
      - OPENAI_API_KEY=sk-local
      - OPENAI_REVERSE_PROXY=http://nex-niflo-agent-api:8000/v1
      - MONGO_URI=mongodb://nex-niflo-agent-mongodb:27017/LibreChat
      - JWT_SECRET=106c5475143a593393952f44146059d4
      - REFRESH_TOKEN_SECRET=2b4923f7d1b327b822d6e3c3b3e34b5c
      - JWT_REFRESH_SECRET=2b4923f7d1b327b822d6e3c3b3e34b5c
      - CREDS_KEY=d7a744f4a9b6c000dfb3f07a0f670f56
      - CREDS_IV=d7a744f4a9b6c000dfb3f07a0f670f56
      - DOMAIN_CLIENT=http://localhost:3210
      - DOMAIN_SERVER=http://localhost:3210
      - SESSION_EXPIRY=1000 * 60 * 60 * 24 * 7
      - REFRESH_TOKEN_EXPIRY=1000 * 60 * 60 * 24 * 30
      - ALLOW_REGISTRATION=true
      - ALLOW_SOCIAL_LOGIN=false
    depends_on:
      - nex-niflo-agent-api
      - nex-niflo-agent-mongodb
    restart: unless-stopped

  nex-niflo-agent-mongodb:
    image: mongo:latest
    container_name: nex-niflo-agent-mongodb
    ports:
      - "27018:27017"
    volumes:
      - nex-niflo-agent-mongodb:/data/db
    restart: unless-stopped

volumes:
  nex-niflo-agent-ollama:
  nex-niflo-agent-n8n:
  nex-niflo-agent-qdrant:
  nex-niflo-agent-redis:
  nex-niflo-agent-mongodb:
